CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="ChofuCharlie"

# ==================== デバッグログ用（テストが終わったら必ず削除/コメントアウト！） ====================
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y          # ← これでZMK全体のログレベルをDebugに
# CONFIG_ZMK_KSCAN_LOG_LEVEL_DBG=y  # ← これを削除！（存在しないのでエラーになる）

# さらに詳細なkscanログが欲しい場合は、以下を追加（推奨）
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=4          # または DBG=4
