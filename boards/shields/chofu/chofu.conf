CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="ChofuCharlie"

# ==================== デバッグ用ログ設定（テスト終了後に必ず削除！） ====================
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL=4
# ZMK全体のログレベルをDebug（4）に設定

# kscanの詳細ログをより確実に出すための追加設定（推奨）
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=4
# ZephyrログのデフォルトレベルをDebugに
