CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="ChofuCharlie"

# ==================== デバッグログ設定（テストが終わったら必ず削除/コメントアウト！） ====================
CONFIG_ZMK_USB_LOGGING=y

# ZMKのログレベルをDebugにする（これが一番効果的）
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Zephyrログシステム全体を有効化＋Debugレベル（kscanの詳細ログが出やすくなる）
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_MODE_IMMEDIATE=y
